# Cloudflare Tunnel — api.pyosh.com 진입점
#
# 사전 준비:
#   1) Cloudflare Zero Trust → Networks → Tunnels 에서 tunnel 생성
#   2) Public Hostname: api.pyosh.com → HTTP → blog_container:5500
#   3) "Install connector → Docker" 에서 보여주는 명령의 --token 뒤 긴 문자열 복사
#   4) 이 파일과 같은 폴더에 .env 파일 만들고 한 줄: TUNNEL_TOKEN=<복사한 토큰>
#   5) chmod 600 .env
#
# 운영:
#   docker compose up -d        # 시작
#   docker compose logs -f      # 연결 상태 확인 ("Registered tunnel connection")
#
# 이 서비스는 blog 앱 compose와 분리되어 있어, 앱을 재배포해도 tunnel 연결은 유지된다.
services:
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: cloudflared
    restart: unless-stopped
    # cloudflared의 `tunnel run` 서브커맨드는 --token 플래그를 명시적으로 요구한다.
    # 토큰 값은 같은 폴더의 .env (compose가 ${...} 보간용으로 자동 로드) 에서 가져온다.
    # ${TUNNEL_TOKEN:?...} 구문은 변수가 비어있으면 compose가 즉시 친절한 에러를 출력한다.
    command: tunnel --no-autoupdate run --token ${TUNNEL_TOKEN:?TUNNEL_TOKEN must be set in cloudflared/.env}
    networks:
      - blog_network

networks:
  blog_network:
    external: true
